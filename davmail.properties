# DavMail Exchange Gateway Configuration Template
# Optimized for running as a headless sidecar container with modern O365 modern authentication.

# Enable headless server mode (no GUI tray)
davmail.server=true

# Use modern Graph API backend for Office 365
davmail.mode=O365Graph
davmail.url=https://outlook.office365.com/EWS/Exchange.asmx

# Authentication mode
# O365DeviceCode prints the authentication link and code to the container logs.
# You can check them using `docker logs davmail`.
davmail.authentication=O365DeviceCode

# Protocol Ports (0 disables the protocol)
davmail.imapPort=1143
davmail.popPort=0
davmail.smtpPort=0
davmail.caldavPort=0
davmail.ldapPort=0

# Network Bindings
# Bind to all interfaces inside the container so it can be reached by the sidecar daemon
davmail.bindAddress=0.0.0.0

# Local connection security
# Disable SSL for local connections to the sidecar (traffic stays inside the Docker network)
davmail.ssl.nosecureimap=true

# Session and OAuth Persistence Settings
davmail.keepDelay=30
davmail.oauth.persistToken=true

# Optional: Custom OAuth2 App registration client ID (if your organization blocks the default)
# davmail.oauth.clientId=d3590ed6-52b3-4102-aeff-aad2292ab01c
# davmail.oauth.redirectUri=urn:ietf:wg:oauth:2.0:oob

# Log Settings
davmail.logFilePath=/var/log/davmail/davmail.log
davmail.logFileSize=1MB
log4j.rootLogger=WARN
log4j.logger.davmail=INFO
